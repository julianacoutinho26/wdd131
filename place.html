<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover [Place]</title>
   
  <meta name="description" content="Discover the beauty and culture of [Place]. Learn about its history, weather, and explore a gallery of stunning images.">

  
  <meta name="author" content="Juliana Coutinho">
 
  <link rel="stylesheet" href="styles/place.css">

  
  <script src="scripts/place.js" defer></script>
</head>
<body>
  <header>
    <h1>Discover [Place]</h1>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Weather</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  
  <main>
    <div class="hero">
      <picture>
        <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
        <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
        <img src="images/hero-small.webp" 
             alt="Scenic view of [Place]" 
             width="1500" height="750">
      </picture>
    </div>

    
    <section class="about">
      <h2>About [Place]</h2>
      <p>Background information about the location goes here.</p>
    </section>

    <section class="weather">
      <h2>Weather</h2>
      <p>Temperature: <span id="temp">25°C</span></p>
      <p>Wind Speed: <span id="wind">10 km/h</span></p>
      <p>Wind Chill: <span id="windchill">N/A</span></p>
    </section>

    <section class="gallery">
      <h2>Gallery</h2>
      <p>Images or descriptions of notable landmarks.</p>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> | Last Modified: <span id="lastModified"></span></p>
  </footer>
</body>
</html>
