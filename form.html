<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Submit a detailed product review including ratings, installation date, useful features, and feedback to improve usability.">
  <meta name="author" content="Juliana Coutinho Rodrigues">
  <title>Form Assignment | Week 5</title>
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Product Review Form</h1>
  </header>

  <main>
    <form method="get" action="review.html">
      <!-- Product Name -->
      <label for="product">Product Name:</label>
      <select id="product" name="product" required>
        <option value="" disabled selected>Select a Product ...</option>
      </select>

      <!-- Overall Rating -->
      <fieldset>
        <legend>Overall Rating:</legend>
        <label for="rating1">1 ☆</label>
        <input type="radio" id="rating1" name="rating" value="1" required>
        
        <label for="rating2">2 ☆</label>
        <input type="radio" id="rating2" name="rating" value="2" required>
        
        <label for="rating3">3 ☆</label>
        <input type="radio" id="rating3" name="rating" value="3" required>
        
        <label for="rating4">4 ☆</label>
        <input type="radio" id="rating4" name="rating" value="4" required>
        
        <label for="rating5">5 ☆</label>
        <input type="radio" id="rating5" name="rating" value="5" required>
      </fieldset>

      <!-- Date of Installation -->
      <label for="installDate">Date of Installation:</label>
      <input type="date" id="installDate" name="installDate" required>

      <!-- Useful Features -->
      <fieldset>
  <legend>Useful Features (check all that apply):</legend>
  <label for="feature1">Feature A</label>
  <input type="checkbox" id="feature1" name="features" value="Feature A">

  <label for="feature2">Feature B</label>
  <input type="checkbox" id="feature2" name="features" value="Feature B">

  <label for="feature3">Feature C</label>
  <input type="checkbox" id="feature3" name="features" value="Feature C">

  <label for="feature4">Feature D</label>
  <input type="checkbox" id="feature4" name="features" value="Feature D">
</fieldset>


      <!-- Written Review -->
      <label for="review">Written Review:</label>
      <textarea id="review" name="review"></textarea>

      <!-- User Name -->
      <label for="username">Your Name:</label>
      <input type="text" id="username" name="username">

      <!-- Submit Button -->
      <input type="submit" value="Submit Review">
    </form>
  </main>

  <footer>
    <p>&copy; 2026 | Juliana Coutinho Rodrigues | WDD 131</p>
  </footer>


</body>
</html>
